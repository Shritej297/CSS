<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: blue;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .fact-file{
            background-color: teal;
            color: blanchedalmond;
            width: 260px;
            padding: 25px;
            border: 4px solid forestgreen;
             margin: 30px;
        }
        .animal-name{
            color: chocolate;
            font-size: 22px;
        }
        .detail{
            color: rgb(43, 226, 180);
        }
        .cool-fact{
            color: cornsilk;
            font-style: italic;
        }

    </style>
</head>
<body>


    <div class="fact-file">
        <h2 class="animal-name">Snow Leopard</h2>
        <p class="detail">Type: Big Cat</p>
        <p class="detail">Lives in: Mountain ranges of Central Asia</p>
        <p class="detail">Diet: Deer, goats, and wild sheep</p>
        <p class="cool-fact">Cool Fact: Can leade up to 15 metres in one jump!</p>
    </div>
    
</body>
</html>
