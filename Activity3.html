<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity</title>
    <style>
        .r{
            text-decoration: overline;
        }
        .bat{
            text-transform: uppercase;
        }
        #you{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 30px;

        }
        .shadow{
            text-shadow: 3px 3px;
            color: rgb(75, 183, 183);
        }
        .class{
            transform: rotate(
                110deg
            );
        }

    </style>
</head>
<body>
     
     <p style="background-color: dimgray;">hi am i here</p>
    <p class="r">hi am i here</p>
    <h1 class="bat">what</h1>
    <h2 id="you">youtube</h2>
    
  <div >
    <h1 class="shadow">My Space Page</h1>
    <p>Welcome to my corner of the galaxy!</p>
  </div>

  <div >
    <h2 class="class">Fun Space Fact</h2>
    <p>The Sun is so big that one million Earths could fit inside it.</p>
  </div>
</body>
</html>
